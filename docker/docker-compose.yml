services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: varyo_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Varyo_Dev2024!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ../db/migrations:/migrations:ro
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Varyo_Dev2024!" -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: varyo_web
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__VaryoCms: "Server=sqlserver,1433;Database=Varyo;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;Encrypt=True"
      Jwt__Issuer: "${JWT_ISSUER:-VaryoCms}"
      Jwt__SigningKey: "${JWT_SIGNING_KEY}"
    volumes:
      - varyo_uploads:/app/wwwroot/uploads
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    # Dev: start only the database → docker-compose up -d sqlserver
    # Prod: start everything     → docker-compose up -d

volumes:
  sqlserver_data:
  varyo_uploads:
